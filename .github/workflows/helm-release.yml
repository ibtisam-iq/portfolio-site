name: Helm — Package & Push

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "CI — Build & Push"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY:    ghcr.io
  CHART_NAME:  ibtisam-iq
  CHART_PATH:  helm

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Check for Chart Changes
  # ────────────────────────────────────────────────────────────────
  changes:
    name: Check for Chart Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      helm: ${{ steps.filter.outputs.helm }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Check for changes in helm/
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.workflow_run.head_sha || github.sha }}~1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filters: |
            helm:
              - 'helm/**'

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && needs.changes.outputs.helm == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint
        run: helm lint ${{ env.CHART_PATH }}

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Package & Push
  # ────────────────────────────────────────────────────────────────
  release:
    name: Package & Push to GHCR
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && needs.changes.outputs.helm == 'true') }}
    outputs:
      chart_version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Extract chart version
        id: meta
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }} --destination /tmp/helm-pkg

      - name: Push chart to GHCR
        run: |
          helm push /tmp/helm-pkg/${{ env.CHART_NAME }}-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Log out of GHCR
        if: always()
        run: helm registry logout ${{ env.REGISTRY }}
