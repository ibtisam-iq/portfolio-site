name: Helm — Package & Push

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "CI — Build & Push"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY:    ghcr.io
  CHART_NAME:  ibtisam-iq
  CHART_PATH:  helm

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint
        run: helm lint ${{ env.CHART_PATH }}

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Package & Push
  # ────────────────────────────────────────────────────────────────
  release:
    name: Package & Push to GHCR
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      chart_version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Extract chart version
        id: meta
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }} --destination /tmp/helm-pkg

      - name: Push chart to GHCR
        run: |
          helm push /tmp/helm-pkg/${{ env.CHART_NAME }}-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Log out of GHCR
        if: always()
        run: helm registry logout ${{ env.REGISTRY }}
