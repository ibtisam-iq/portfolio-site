name: CI — Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: mibtisam
  DOCKERHUB_IMAGE:    mibtisam/mibtisam
  GHCR_IMAGE:         ghcr.io/${{ github.repository_owner }}/${{ github.repository_owner }}

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Push (per platform)
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare platform slug
        id: slug
        run: echo "value=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ !env.ACT && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: ${{ !env.ACT && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ !env.ACT }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          labels: |
            org.opencontainers.image.title=portfolio-site
            org.opencontainers.image.description=Muhammad Ibtisam — Portfolio
            org.opencontainers.image.url=https://ibtisam-iq.com
            org.opencontainers.image.source=https://github.com/ibtisam-iq/portfolio-site
            org.opencontainers.image.vendor=Muhammad Ibtisam
            org.opencontainers.image.authors=Muhammad Ibtisam <contact@ibtisam-iq.com>
            org.opencontainers.image.licenses=MIT
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=ref,event=pr,suffix=-pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Under act : load into local daemon, tag as :local (no outputs/digest needed)
      # On CI push: push raw digest only (no tags — tags applied in merge-and-tag job)
      # On CI PR  : build only, no push, no digest export
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ !!env.ACT && 'linux/amd64' || matrix.platform }}
          load: ${{ !!env.ACT }}
          push: ${{ !env.ACT && github.event_name != 'pull_request' }}
          tags: ${{ !!env.ACT && format('{0}:local', env.DOCKERHUB_IMAGE) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ steps.slug.outputs.value }}
          cache-to:   type=gha,scope=${{ steps.slug.outputs.value }},mode=max
          outputs: ${{ !env.ACT && github.event_name != 'pull_request' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.DOCKERHUB_IMAGE) || '' }}

      - name: Export digest
        if: ${{ !env.ACT && github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: ${{ !env.ACT && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-${{ steps.slug.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Merge manifests & tag
  # ────────────────────────────────────────────────────────────────
  merge-and-tag:
    name: Merge manifests & tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download all digests
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ !env.ACT }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: ${{ !env.ACT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ !env.ACT }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=ref,event=pr,suffix=-pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create & push multi-arch manifest
        if: ${{ !env.ACT }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)

      - name: Inspect manifest
        if: ${{ !env.ACT }}
        run: docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:latest
