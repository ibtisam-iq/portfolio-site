name: GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - 'helm/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - 'helm/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  workflow_dispatch:

# One deployment per branch/PR; cancel in-progress on newer push
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build + QA
  # ────────────────────────────────────────────────────────────────
  build-and-quality:
    name: Build Site
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # tsc -b runs inside npm run build (vite.config.ts); no separate tsc step needed
      - name: Build
        run: npm run build

      # CNAME: tells GitHub Pages which custom domain to serve
      - name: Write CNAME
        run: echo "ibtisam-iq.com" > dist/CNAME

      # 404.html: Pages serves this on unknown paths; React Router handles the rest
      - name: Write 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — PR Preview (runs ONLY on pull_request)
  # Live URL: https://ibtisam-iq.com/previews/pr-<number>/
  # Auto-deleted when PR is merged or closed.
  # Also posts the preview URL as a comment on the PR automatically.
  # ────────────────────────────────────────────────────────────────
  pr-preview:
    name: Deploy PR Preview
    # Runs on all PR events; rossjrw/pr-preview-action handles deploy vs cleanup
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: write       # gh-pages branch push
      pull-requests: write  # post preview URL comment via marocchino/sticky-pull-request-comment

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      # VITE_BASE_PATH scopes all asset paths and React Router basename to the
      # preview sub-path so the full site works at /pr-preview/pr-N/
      - name: Build
        if: github.event.action != 'closed'
        run: npm run build
        env:
          VITE_BASE_PATH: /pr-preview/pr-${{ github.event.pull_request.number }}/

      # No CNAME: would redirect away from /previews/pr-N
      - name: Write 404 fallback
        if: github.event.action != 'closed'
        run: cp dist/index.html dist/404.html

      # token: required — rossjrw calls marocchino/sticky-pull-request-comment
      # internally; without explicit token it falls back to a read-only default
      - name: Deploy PR preview
        if: ${{ env.ACT != 'true' }}
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source_dir: ./dist
          umbrella_dir: previews
          action: auto
          token: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Production Deploy (runs ONLY on push to main)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to GitHub Pages
    needs: build-and-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        if: ${{ env.ACT != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
