name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths-ignore:
      - '**/*.md'
      - '**/LICENSE'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  workflow_dispatch:

# One deployment per branch/PR; cancel in-progress on newer push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # tsc -b runs inside npm run build (vite.config.ts); no separate tsc step needed
      - name: Build
        run: npm run build

      # CNAME: tells GitHub Pages which custom domain to serve
      - name: Write CNAME
        run: echo "ibtisam-iq.com" > dist/CNAME

      # 404.html: Pages serves this on unknown paths; React Router handles the rest
      - name: Write 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  pr-preview:
    # Runs on all PR events; rossjrw/pr-preview-action handles deploy vs cleanup
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: write       # gh-pages branch push
      pull-requests: write  # post preview URL comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build

      - name: Write 404 fallback
        if: github.event.action != 'closed'
        run: cp dist/index.html dist/404.html

      # No CNAME here: CNAME redirects away from /previews/pr-N sub-path
      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source_dir: ./dist
          umbrella_dir: previews
          action: auto

  deploy-production:
    needs: build-and-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
