# nginx — portfolio-site
# Non-privileged port 8080, hardened headers, SPA fallback, asset caching

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 1m;

    # -- Security headers -----------------------------------------------------

    # CSP: script-src self (Vite bundles to /assets/); unsafe-inline for Tailwind;
    # data: img for react-icons SVGs; Fontshare + Google Fonts for fonts
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection omitted — deprecated Chrome 78+, harmful on IE11; CSP covers this
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -- Compression ----------------------------------------------------------
    # Runtime gzip; upgrade path: vite-plugin-compression + gzip_static on
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -- Static assets --------------------------------------------------------
    # Vite content-hashes all output filenames — safe for 1y immutable cache
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # add_header not inherited inside location blocks
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -- SPA fallback ---------------------------------------------------------
    # react-router-dom owns all routing; unknown paths must resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached — stale HTML references old hashed asset URLs
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
