# =============================================================================
# nginx.conf — portfolio-site
# Fix #3:  Port 8080 native (no sed in Dockerfile)
# Fix #7:  Full CSP header for React 19 SPA with react-icons + Tailwind
# Fix #8:  X-XSS-Protection removed (deprecated Chrome 78+, harmful on IE)
# Fix #9:  Runtime gzip (correct fallback; pre-compression is a build opt)
# Fix #14: client_max_body_size defined
# =============================================================================

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server response header
    server_tokens off;

    # ── Request Hardening ─────────────────────────────────────────────────────
    # Static portfolio — no file uploads. Cap body to prevent abuse.
    client_max_body_size 1m;

    # ── Security Headers ──────────────────────────────────────────────────────

    # Fix #7: Content-Security-Policy — the primary XSS defence for React SPAs.
    # Policy breakdown for this specific stack:
    #   script-src 'self'        — Vite bundles all JS to /assets/; no CDN scripts
    #   style-src 'self' 'unsafe-inline' — Tailwind inlines critical CSS at runtime;
    #                              tighten to a nonce-based policy in future CI step
    #   font-src                 — Fontshare + Google Fonts (used in the portfolio)
    #   img-src 'self' data: https: — react-icons renders SVGs as data: URIs;
    #                              portfolio may load external project screenshots
    #   frame-ancestors 'none'   — replaces X-Frame-Options; no iframing allowed
    #   base-uri / form-action   — prevent base-tag hijacking and form redirection
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    # Prevents clickjacking — belt-and-suspenders alongside frame-ancestors in CSP
    # (older proxies and scanners may not parse CSP frame-ancestors)
    add_header X-Frame-Options "DENY" always;

    # Prevents MIME-type sniffing — stops browsers executing mistyped responses
    add_header X-Content-Type-Options "nosniff" always;

    # Fix #8: X-XSS-Protection intentionally OMITTED.
    # Deprecated since Chrome 78 (2019), never implemented in Firefox.
    # On IE11 it can *introduce* XSS vulnerabilities in certain scenarios.
    # CSP (above) is the correct modern replacement.

    # Limits referer leakage on cross-origin navigation
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricts browser feature APIs — portfolio needs none of these
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HSTS — enforce HTTPS when behind a TLS terminator (reverse proxy / ingress / CDN)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Compression ───────────────────────────────────────────────────────────
    # Fix #9: Runtime gzip. The gzip module is compiled into nginx:alpine by default.
    # NOTE: For a performance upgrade, add vite-plugin-compression to emit pre-compressed
    # .gz / .br files at build time, then switch to `gzip_static on` here. That
    # eliminates CPU overhead on every request. This is a build-side optimization
    # outside the scope of this Dockerfile — documented for your next iteration.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Static Asset Caching ──────────────────────────────────────────────────
    # Vite appends content hashes to all output filenames (e.g. index-Bx3kYz.js).
    # Content hash = immutable asset. Cache for 1 year; browser revalidates
    # automatically on next deploy because the filename changes.
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers — nginx does NOT inherit add_header from
        # the server block inside location blocks (a well-known nginx gotcha)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── React Router SPA Fallback ─────────────────────────────────────────────
    # react-router-dom handles all routing client-side. When a user navigates
    # directly to /projects or /about (or refreshes), nginx must serve index.html
    # instead of returning 404. try_files checks for a real file/dir first,
    # falling back to /index.html so the browser-side router takes over.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must NEVER be cached — it references the hashed asset filenames.
        # If the browser caches a stale index.html it will request old asset URLs
        # that no longer exist after a new deployment, breaking the app.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
